name: MCT
version: '${version}'
main: me.jitish.mCT.MCT
api-version: 1.13
authors: [ Jitish ]
commands:
  die:
    description: An easy way to kill yourself!
    usage: /<command>

  god:
    description: Become Invincible
    usage: /<command> [all | player | player1 player2 player3...] [on | off]

  feedme:
    description: fills your food level
    usage: /<command> [all | player | player1 player2 player3...]
    aliases:
      - feed

  healme:
    description: heals you
    usage: /<command> [all | player | player1 player2 player3...]
    aliases:
      - heal

  setHealth:
    description: sets your health level to provided number
    usage: /<command> <0-20> | /<command> <player|all> <0-20>

  setspawn:
    description: sets the new spawn point

  spawn:
    description: this tp you to the spawn location

  nightvision:
    description: gives you night vision!!
    usage: /<command> [all | player | player1 player2 player3...] [on | off]

  fly:
    description: Fly command
    usage: /fly [all | player | player1 player2 player3...] [on | off]

  ping:
    description: Toggle your ping display (action bar)
    usage: /ping [on|off]
    aliases:
      - latency

  repair:
    description: Repair item in hand or all items in inventory
    usage: /repair | /repair all | /repair <player|all> [all]
    aliases:
      - fix

  afk:
    description: Toggle AFK mode with a holographic display above your head
    usage: /afk

  setFood:
    description: sets your food level to provided number
    usage: /<command> <0-20> | /<command> <player|all> <0-20>
    aliases:
      - setfoodlevel

  enchantt:
    description: Enchant any item up to level 255 (bypasses vanilla limits)
    usage: /enchantt <player|all> <enchantment> <level>

  denchant:
    description: Remove enchantments from held item or entire inventory
    usage: /denchant <player|all> [enchantment | all]

  summonn:
    description: Summon multiple entities at once (up to 500)
    usage: /summonn <entity> [amount] [player | x y z]

  pwarp:
    description: Create and use player warps
    usage: /pwarp <go|create|delete|list|info|private|allow|deny|allowed>
    aliases:
      - pw
      - playerwarps

  swarp:
    description: Create and use server warps
    usage: /swarp <go|create|delete|list|info|private|allow|deny|allowed>
    aliases:
      - sw
      - serverwarp
      - serverwarps

  tpa:
    description: Send a teleport request to another player
    usage: /tpa <player>

  tpahere:
    description: Request another player to teleport to you
    usage: /tpahere <player>

  tpaccept:
    description: Accept a pending teleport request
    usage: /tpaccept
    aliases:
      - tpyes
      - accept

  tpdeny:
    description: Deny a pending teleport request
    usage: /tpdeny
    aliases:
      - tpno
      - deny

  tpcancel:
    description: Cancel your outgoing teleport request
    usage: /tpcancel <player>

  back:
    description: Teleport to your previous location
    usage: /back [player]

  tpatoggle:
    description: Toggle receiving TPA requests on/off
    usage: /tpatoggle [player]

  tpaignore:
    description: Ignore a specific player's TPA requests
    usage: /tpaignore <player>
    aliases:
      - tpignore
      - tpblock
      - tpablock

  tpauto:
    description: Toggle auto-accepting all incoming /tpa requests
    usage: /tpauto

  tpahereall:
    description: Send a teleport-here request to all online players
    usage: /tpahereall

permissions:
  MCT.setSpawn:
    description: permission to use /setSpawn commands
    default: op

  MCT.godMode:
    description: permission to use /god commands
    default: op
  MCT.godMode.toOtherPlayers:
    description: Allow to give other player the godMode permission
    default: op
    children:
      MCT.godMode: true


  MCT.fly:
    description: Fly permission
    default: true
  MCT.fly.toOtherPlayers:
    description: Allow to give other player the fly permission
    default: op
    children:
      MCT.fly: true

  MCT.ping:
    description: permission to use /ping command
    default: true

  MCT.repair:
    description: permission to use /repair command (hand item)
    default: op
  MCT.repair.all:
    description: permission to use /repair all (entire inventory)
    default: op
    children:
      MCT.repair: true
  MCT.repair.toOtherPlayers:
    description: Allow repairing other players
    default: op
    children:
      MCT.repair: true

  MCT.afk:
    description: permission to use /afk command
    default: true

  MCT.setHealth:
    description: permission to use /setHealth command
    default: op
  MCT.setHealth.toOtherPlayers:
    description: Allow to set health for other players
    default: op
    children:
      MCT.setHealth: true

  MCT.setFood:
    description: permission to use /setFood command
    default: op
  MCT.setFood.toOtherPlayers:
    description: Allow to set food level for other players
    default: op
    children:
      MCT.setFood: true

  MCT.enchantt:
    description: permission to use /enchantt command
    default: op
  MCT.enchantt.toOtherPlayers:
    description: Allow enchanting other players' held items
    default: op
    children:
      MCT.enchantt: true

  MCT.denchant:
    description: permission to use /denchant command
    default: op
  MCT.denchant.all:
    description: permission to disenchant entire inventory
    default: op
    children:
      MCT.denchant: true
  MCT.denchant.toOtherPlayers:
    description: Allow disenchanting other players' items
    default: op
    children:
      MCT.denchant: true

  MCT.summonn:
    description: permission to use /summonn command
    default: op
  MCT.summonn.toOtherPlayers:
    description: Allow summoning entities at other players' locations
    default: op
    children:
      MCT.summonn: true

  MCT.pwarp:
    description: Use player warps
    default: true
  MCT.pwarp.create:
    description: Create player warps
    default: true
    children:
      MCT.pwarp: true
  MCT.pwarp.remove:
    description: Remove owned player warps
    default: true
    children:
      MCT.pwarp: true
  MCT.pwarp.admin:
    description: Remove any player warp
    default: op
    children:
      MCT.pwarp.remove: true

  MCT.swarp:
    description: Use server warps
    default: true
  MCT.swarp.admin:
    description: Create and remove server warps
    default: op
    children:
      MCT.swarp: true

  MCT.tpa:
    description: Send teleport requests
    default: true
  MCT.tpahere:
    description: Send teleport-here requests
    default: true
  MCT.tpaccept:
    description: Accept teleport requests
    default: true
  MCT.tpdeny:
    description: Deny teleport requests
    default: true
  MCT.tpcancel:
    description: Cancel outgoing teleport requests
    default: true
  MCT.tpatoggle:
    description: Toggle receiving TPA requests
    default: true
  MCT.tpatoggle.others:
    description: Toggle TPA for other players
    default: op
    children:
      MCT.tpatoggle: true
  MCT.tpaignore:
    description: Ignore a player's TPA requests
    default: true
  MCT.tpauto:
    description: Auto-accept incoming /tpa requests
    default: true
  MCT.back:
    description: Teleport to previous location
    default: true
  MCT.back.others:
    description: Send other players to their previous location
    default: op
    children:
      MCT.back: true
  MCT.tpahereall:
    description: Send teleport-here request to all players
    default: op
  MCT.tpa.bypasscooldown:
    description: Bypass all TPA cooldowns
    default: op
